  user_template: |
    Rewrite this bullet about {{entity_name}}, removing redundant information and keeping only unique parts:
    
    <original_bullet>
    {{original_bullet}}
    </original_bullet>
    
    <rationale>
    {{rationale}}
    </rationale>
    
    <response_format>
    Your response should be a JSON object that matches the following schema:
    {{response_format}}
    </response_format>

