<div id="scan-universe-output" style="display:flex;flex-direction:column;gap:1rem">
  {% for s in scans %}
  <div
    id="scan-{{ s.scan_id }}"
    hx-get="/ui/partials/scan-status?scan_id={{ s.scan_id }}"
    hx-trigger="every 3s"
    hx-target="this"
    hx-swap="outerHTML"
  >
    <div class="card">
      <div class="card-body" style="padding:.85rem 1.25rem">
        <div style="font-weight:700;font-size:.92rem;margin-bottom:.4rem">{{ s.entity_name }}</div>
        <div style="font-size:.75rem;color:var(--muted);margin-bottom:.5rem">
          {{ s.effective_start }} → {{ s.end }}
        </div>
        <div class="progress-bar-bg">
          <div class="progress-bar-fill" style="width:0%"></div>
        </div>
        <div class="progress-label" style="margin-top:.3rem">Starting…</div>
      </div>
    </div>
  </div>
  {% endfor %}
</div>
