[project]
name = "portfolio-monitor"
version = "0.1.0"
description = "Portfolio-level sentiment and market data monitor powered by Bigdata.com and OpenAI."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "mcp>=1.27.0",
    "openai>=1.0",
    "requests>=2.31",
    "pandas>=2.0",
    "numpy>=1.26",
    "python-dotenv>=1.0",
]

[project.scripts]
portfolio-monitor-mcp = "portfolio_monitor.server:main"

[tool.uv]
package = true
